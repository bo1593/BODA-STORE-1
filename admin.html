<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم BODA STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --olive-drab: #556B2F; --beige: #F5F5DC; --black: #0B0C0B; }
        body { background: var(--black); color: var(--beige); font-family: 'Cairo', sans-serif; padding: 20px; }
        .admin-card { background: #151712; border: 2px solid var(--olive-drab); padding: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--olive-drab); color: #fff; }
        .btn { background: var(--olive-drab); color: var(--beige); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--olive-drab); align-items: center; }
        .delete-btn { color: red; cursor: pointer; background: none; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="font-family:'Black Ops One'; text-align:center;">ADMIN COMMAND CENTER</h1>
    
    <div class="admin-card">
        <h3>إحصائيات الأرباح المتوقعة</h3>
        <p id="revenue" style="font-size: 2rem; color: var(--olive-drab);">0 EGP</p>
    </div>

    <div class="admin-card">
        <h3>إضافة باقة جديدة</h3>
        <input type="text" id="p-name" placeholder="اسم الباقة (مثال: 660 UC)">
        <input type="number" id="p-price" placeholder="السعر (مثال: 550)">
        <button class="btn" onclick="addItem()">إضافة الباقة للمتجر ➕</button>
    </div>

    <div class="admin-card">
        <h3>الباقات المعروضة حالياً</h3>
        <div id="p-list">جارِ التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
            authDomain: "boda-store-fb2b4.firebaseapp.com",
            projectId: "boda-store-fb2b4",
            storageBucket: "boda-store-fb2b4.firebasestorage.app",
            messagingSenderId: "363262838551",
            appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadAdmin() {
            const q = query(collection(db, "packages"), orderBy("createdAt", "asc"));
            const snap = await getDocs(q);
            const list = document.getElementById('p-list');
            let total = 0;
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                total += parseInt(p.price);
                list.innerHTML += `<div class="item"><span>${p.name} - ${p.price} EGP</span><button class="delete-btn" onclick="window.delItem('${d.id}')">حذف 🗑️</button></div>`;
            });
            document.getElementById('revenue').innerText = total + " EGP";
        }

        window.addItem = async () => {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            if(!n || !p) return alert("أدخل البيانات!");
            await addDoc(collection(db, "packages"), { name: n, price: p, createdAt: serverTimestamp() });
            location.reload();
        };

        window.delItem = async (id) => {
            if(confirm("حذف الباقة؟")) {
                await deleteDoc(doc(db, "packages", id));
                loadAdmin();
            }
        };

        loadAdmin();
    </script>
</body>
</html>

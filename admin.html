<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم BODA STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --olive-drab: #556B2F; --beige: #F5F5DC; --black: #0B0C0B; --olive-bright: #808000; }
        body { background: var(--black); color: var(--beige); font-family: 'Cairo', sans-serif; padding: 20px; margin: 0; }
        .admin-card { background: #151712; border: 2px solid var(--olive-drab); padding: 20px; margin-bottom: 20px; clip-path: polygon(2% 0, 100% 0, 100% 90%, 98% 100%, 0 100%, 0 10%); }
        h3 { color: var(--olive-bright); border-bottom: 1px solid var(--olive-drab); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--olive-drab); color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--beige); }
        .btn { background: var(--olive-drab); color: var(--beige); border: none; padding: 15px 20px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-family: 'Cairo'; }
        .btn:hover { background: var(--olive-bright); }
        .item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; align-items: center; }
        .delete-btn { color: #ff4444; cursor: pointer; background: none; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 4px; transition: 0.3s; }
        .delete-btn:hover { background: #ff4444; color: #fff; }
    </style>
</head>
<body>
    <h1 style="font-family:'Black Ops One'; text-align:center; color: var(--olive-drab); font-size: 2.5rem; margin-bottom: 30px;">ADMIN COMMAND CENTER</h1>
    
    <div class="admin-card">
        <h3>📊 إحصائيات الأرباح المتوقعة</h3>
        <p id="revenue" style="font-size: 2.5rem; color: var(--beige); font-weight: 900; margin: 10px 0;">0 EGP</p>
    </div>

    <div class="admin-card">
        <h3>➕ إضافة باقة جديدة</h3>
        <input type="text" id="p-name" placeholder="اسم الباقة (مثال: 660 UC)">
        <input type="number" id="p-price" placeholder="السعر (مثال: 550)">
        <button class="btn" onclick="addItem()">إضافة الباقة للمتجر 🚀</button>
    </div>

    <div class="admin-card">
        <h3>🛠️ الباقات المعروضة حالياً</h3>
        <div id="p-list">جارِ الاتصال بالسيرفر في أمريكا...</div>
    </div>

<script type="module">
    // تحديث لنسخة أحدث وأكثر استقراراً
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { 
        initializeFirestore, 
        collection, 
        getDocs, 
        addDoc, 
        deleteDoc, 
        doc, 
        query, 
        limit, 
        memoryLocalCache,
        serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
        authDomain: "boda-store-fb2b4.firebaseapp.com",
        projectId: "boda-store-fb2b4",
        storageBucket: "boda-store-fb2b4.firebasestorage.app",
        messagingSenderId: "363262838551",
        appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
    };

    const app = initializeApp(firebaseConfig);

    // الحل النهائي لمشكلة (default) وتأخير الاتصال في مصر
    const db = initializeFirestore(app, {
        experimentalForceLongPolling: true, // إجبار المتصفح على تجاوز عوائق الشبكة
        useFetchStreams: false,
        localCache: memoryLocalCache()
    }, "(default)");

    async function loadAdminData() {
        try {
            const q = query(collection(db, "packages"), limit(100));
            const snap = await getDocs(q);
            const list = document.getElementById('p-list');
            let total = 0;
            list.innerHTML = "";
            
            if (snap.empty) {
                list.innerHTML = "<p style='text-align:center;'>المتجر فارغ حالياً. ابدأ بإضافة باقات!</p>";
                document.getElementById('revenue').innerText = "0 EGP";
                return;
            }

            snap.forEach(documentSnapshot => {
                const p = documentSnapshot.data();
                const id = documentSnapshot.id;
                total += parseInt(p.price) || 0;
                
                list.innerHTML += `
                    <div class="item">
                        <div>
                            <strong style="color:var(--olive-bright)">${p.name}</strong> 
                            <span style="margin-right:15px;">${p.price} EGP</span>
                        </div>
                        <button class="delete-btn" onclick="deleteItem('${id}')">حذف 🗑️</button>
                    </div>`;
            });
            document.getElementById('revenue').innerText = total + " EGP";
        } catch (error) {
            console.error("خطأ:", error);
            document.getElementById('p-list').innerHTML = "فشل الاتصال: " + error.message;
        }
    }

    window.addItem = async () => {
        const nameInput = document.getElementById('p-name');
        const priceInput = document.getElementById('p-price');
        
        if (!nameInput.value || !priceInput.value) {
            return alert("أدخل اسم الباقة وسعرها أولاً!");
        }

        try {
            await addDoc(collection(db, "packages"), {
                name: nameInput.value,
                price: priceInput.value,
                createdAt: serverTimestamp()
            });
            alert("تم الحفظ في السيرفر بنجاح! ✅");
            nameInput.value = "";
            priceInput.value = "";
            loadAdminData();
        } catch (error) {
            alert("خطأ أثناء الإضافة: " + error.message);
        }
    };

    window.deleteItem = async (id) => {
        if (confirm("هل أنت متأكد من الحذف؟")) {
            try {
                await deleteDoc(doc(db, "packages", id));
                loadAdminData();
            } catch (error) {
                alert("فشل الحذف.");
            }
        }
    };

    loadAdminData();
</script>
</body>
</html>

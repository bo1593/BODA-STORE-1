<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم BODA STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --olive-drab: #556B2F; --beige: #F5F5DC; --black: #0B0C0B; }
        body { background: var(--black); color: var(--beige); font-family: 'Cairo', sans-serif; padding: 20px; }
        .admin-card { background: #151712; border: 2px solid var(--olive-drab); padding: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--olive-drab); color: #fff; }
        .btn { background: var(--olive-drab); color: var(--beige); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--olive-drab); align-items: center; }
        .delete-btn { color: red; cursor: pointer; background: none; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="font-family:'Black Ops One'; text-align:center;">ADMIN COMMAND CENTER</h1>
    
    <div class="admin-card">
        <h3>إحصائيات الأرباح المتوقعة</h3>
        <p id="revenue" style="font-size: 2rem; color: var(--olive-drab);">0 EGP</p>
    </div>

    <div class="admin-card">
        <h3>إضافة باقة جديدة</h3>
        <input type="text" id="p-name" placeholder="اسم الباقة (مثال: 660 UC)">
        <input type="number" id="p-price" placeholder="السعر (مثال: 550)">
        <button class="btn" onclick="addItem()">إضافة الباقة للمتجر ➕</button>
    </div>

    <div class="admin-card">
        <h3>الباقات المعروضة حالياً</h3>
        <div id="p-list">جارِ التحميل...</div>
    </div>

 <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // استيراد initializeFirestore لحل مشكلة الاتصال
    import { 
        initializeFirestore, 
        collection, 
        getDocs, 
        query, 
        limit, 
        memoryLocalCache 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
        authDomain: "boda-store-fb2b4.firebaseapp.com",
        projectId: "boda-store-fb2b4",
        storageBucket: "boda-store-fb2b4.firebasestorage.app",
        messagingSenderId: "363262838551",
        appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
    };

    // تهيئة التطبيق
    const app = initializeApp(firebaseConfig);

    // الحل الجذري لمشكلة الاتصال (Long Polling)
    const db = initializeFirestore(app, {
        experimentalForceLongPolling: true,
        localCache: memoryLocalCache()
    });

    let selectedPack = "", selectedPrice = "";

    async function loadData() {
        try {
            // جلب البيانات بدون اشتراط الترتيب الزمني حالياً لتجنب مشاكل الـ Index
            const q = query(collection(db, "packages"), limit(100));
            const snap = await getDocs(q);
            const list = document.getElementById('offers-list');
            list.innerHTML = "";
            
            if (snap.empty) {
                list.innerHTML = "<p style='text-align:center;'>لا توجد باقات متاحة حالياً.</p>";
                return;
            }

            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <h2>${p.name}</h2>
                        <span style="font-size:1.8rem; color:var(--olive-bright); font-weight:900;">${p.price} EGP</span>
                        <br><br>
                        <button class="olive-btn" onclick="window.openPay('${p.name}', '${p.price}')">تجهيز الطلب</button>
                    </div>`;
            });
        } catch (error) {
            console.error("خطأ في تحميل البيانات:", error);
        }
    }

    window.openPay = (n, p) => {
        selectedPack = n; selectedPrice = p;
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('payment-page').style.display = 'block';
        document.getElementById('order-title').innerText = "تأكيد " + n;
    };

    window.finalize = () => {
        const id = document.getElementById('player-id').value;
        const name = document.getElementById('player-name').value;
        const sender = document.getElementById('sender-number').value;
        if(!id || !name || !sender) return alert("أكمل البيانات!");
        const msg = `طلب جديد: ${selectedPack}%0Aالسعر: ${selectedPrice}%0AID: ${id}%0Aالاسم: ${name}%0Aالمحول: ${sender}`;
        window.location.href = `https://wa.me/201044580421?text=${msg}`;
    };

    loadData();
</script>
</body>
</html>

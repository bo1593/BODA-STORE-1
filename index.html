<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BODA STORE | OLIVE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --olive-drab: #556B2F; --olive-bright: #808000; --beige: #F5F5DC; --dark-beige: #D2B48C; --black: #0B0C0B; }
        body { background-color: var(--black); color: var(--beige); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 200%; height: 200%; background-image: linear-gradient(rgba(128, 128, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(128, 128, 0, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; animation: moveGrid 20s linear infinite; }
        @keyframes moveGrid { 0% { transform: translate(0, 0); } 100% { transform: translate(-40px, -40px); } }
        header { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        header h1 { font-family: 'Black Ops One', cursive; font-size: clamp(2.5rem, 12vw, 6rem); margin: 10px 0; border-bottom: 6px solid var(--olive-drab); text-shadow: 3px 3px 0px var(--olive-drab); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .card { background: linear-gradient(145deg, #151712, #000); border: 2px solid var(--olive-drab); padding: 40px 20px; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%); text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--beige); transform: translateY(-5px); }
        .olive-btn { width: 100%; padding: 15px; background: var(--olive-drab); color: var(--beige); border: none; font-weight: 900; cursor: pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); font-size: 1.1rem; }
        #payment-page { display: none; width: 90%; max-width: 500px; margin: 20px auto; background: #121411; border: 2px solid var(--olive-drab); padding: 25px; }
        .cash-box { background: var(--beige); color: var(--black); padding: 15px; text-align: center; font-weight: 900; margin-bottom: 20px; border-left: 5px solid var(--olive-drab); }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; color: var(--dark-beige); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; background: #1c1f1a; border: 1px solid var(--olive-drab); color: var(--beige); outline: none; box-sizing: border-box; }
        footer { text-align: center; padding: 40px; color: var(--olive-drab); font-family: 'Black Ops One'; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="main-view">
        <header>
            <p style="color: var(--olive-bright); font-weight: bold; letter-spacing: 2px;">[ MISSION STATUS: READY ]</p>
            <h1>BODA STORE</h1>
            <p>⚡ النمط العسكري لشحن شدات ببجي ⚡</p>
        </header>
        <div class="container" id="offers-list"></div>
    </div>

    <div id="payment-page">
        <button onclick="location.reload()" style="background:none; border:1px solid red; color:red; cursor:pointer; padding:5px; margin-bottom:10px;">✕ إلغاء</button>
        <h2 id="order-title" style="text-align:center;"></h2>
        <div class="cash-box">فودافون كاش: 01044580421</div>
        <div class="input-group"><label>ID اللاعب:</label><input type="number" id="player-id"></div>
        <div class="input-group"><label>اسم اللاعب:</label><input type="text" id="player-name"></div>
        <div class="input-group"><label>الرقم المحول منه:</label><input type="number" id="sender-number"></div>
        <button class="olive-btn" onclick="finalize()">تأكيد الإرسال ⚡</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
            authDomain: "boda-store-fb2b4.firebaseapp.com",
            projectId: "boda-store-fb2b4",
            storageBucket: "boda-store-fb2b4.firebasestorage.app",
            messagingSenderId: "363262838551",
            appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let selectedPack = "", selectedPrice = "";

        async function loadData() {
            const q = query(collection(db, "packages"), orderBy("createdAt", "asc"));
            const snap = await getDocs(q);
            const list = document.getElementById('offers-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `<div class="card"><h2>${p.name}</h2><span style="font-size:1.8rem; color:var(--olive-bright); font-weight:900;">${p.price} EGP</span><br><br><button class="olive-btn" onclick="window.openPay('${p.name}', '${p.price}')">تجهيز الطلب</button></div>`;
            });
        }

        window.openPay = (n, p) => {
            selectedPack = n; selectedPrice = p;
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('payment-page').style.display = 'block';
            document.getElementById('order-title').innerText = "تأكيد " + n;
        };

        window.finalize = () => {
            const id = document.getElementById('player-id').value;
            const name = document.getElementById('player-name').value;
            const sender = document.getElementById('sender-number').value;
            if(!id || !name || !sender) return alert("أكمل البيانات!");
            const msg = `طلب جديد: ${selectedPack}%0Aالسعر: ${selectedPrice}%0AID: ${id}%0Aالاسم: ${name}%0Aالمحول: ${sender}`;
            window.location.href = `https://wa.me/201044580421?text=${msg}`;
        };

        loadData();
    </script>
    <footer>BODA STORE // 2026</footer>
</body>
</html>
